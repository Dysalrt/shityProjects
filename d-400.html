<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DSP Browser - Главная</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            min-height: 100vh;
            background-color: #121212;
            color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            width: 90%;
            max-width: 600px;
            padding: 40px;
            background-color: #1a1a1a;
            border-radius: 16px;
            border: 1px solid #333;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.5);
            text-align: center;
        }

        h1 {
            margin-top: 0;
            color: #4CAF50;
            font-size: 28px;
        }

        p.welcome-text {
            color: #b0b0b0;
            font-size: 16px;
            margin-bottom: 30px;
            line-height: 1.5;
        }

        .links-section {
            background-color: #242424;
            border-radius: 12px;
            padding: 20px;
            text-align: left;
            border: 1px solid #333;
        }

        .links-section h2 {
            font-size: 18px;
            margin-top: 0;
            margin-bottom: 15px;
            color: #e8eaed;
            border-bottom: 1px solid #333;
            padding-bottom: 8px;
        }

        ul {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        li {
            padding: 10px 0;
            border-bottom: 1px solid #2a2a2a;
            font-size: 15px;
            display: flex;
            justify-content: space-between;
        }

        li:last-child {
            border-bottom: none;
        }

        .code {
            font-weight: bold;
            color: #4CAF50;
            background-color: rgba(76, 175, 80, 0.1);
            padding: 2px 8px;
            border-radius: 6px;
        }

        .name {
            color: #e8eaed;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Добро пожаловать в DSP Browser!</h1>
        <p class="welcome-text">
            Это официальная стартовая страница вашего защищенного браузера. Здесь вы всегда найдете актуальный список кодов для быстрого доступа к проектам.
        </p>

        <div class="links-section">
            <h2>Вот все публичные ссылки на данный момент:</h2>
            <ul>
                <li>
                    <span class="code">D-400</span>
                    <span class="name">данный сайт</span>
                </li>
                <li>
                    <span class="code">D-401</span>
                    <span class="name">SFT</span>
                </li>
                <li>
                    <span class="code">D-402</span>
                    <span class="name">Arcon-parte</span>
                </li>
            </ul>
        </div>
    </div>

</body>
</html>
