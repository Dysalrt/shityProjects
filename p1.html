<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Конструктор уроков Arcon v2</title>
<style>
  :root {
    --accent: #4f4bed;
    --accent-soft: #eceafd;
    --bg: #faf9fc;
    --panel: #ffffff;
    --border: #e3e1ec;
    --text: #1c1c1e;
    --hint: #75758a;
    --danger: #e5484d;
    --danger-soft: #fceeee;
    --theory-tag: #2e7d32;
    --theory-tag-soft: #e8f5e9;
    --ex-tag: #b8860b;
    --ex-tag-soft: #fff8e1;
    --radius: 14px;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    padding: 24px;
    line-height: 1.4;
  }
  .p1-wrap { max-width: 780px; margin: 0 auto; }
  h1 { font-size: 22px; margin: 0 0 4px; }
  .p1-subtitle { color: var(--hint); font-size: 14px; margin: 0 0 24px; }
  .p1-toolbar {
    display: flex; gap: 10px; position: sticky; top: 0;
    background: var(--bg); padding: 12px 0; z-index: 10;
    border-bottom: 1px solid var(--border); margin-bottom: 20px;
  }
  button { font-family: inherit; cursor: pointer; border: none; border-radius: 10px; padding: 10px 16px; font-size: 14px; font-weight: 600; }
  .p1-btn-primary { background: var(--accent); color: #fff; }
  .p1-btn-danger { background: var(--danger-soft); color: var(--danger); }
  .p1-btn-ghost { background: var(--accent-soft); color: var(--accent); }
  .p1-btn-small { padding: 6px 10px; font-size: 13px; font-weight: 500; }
  .p1-btn-remove { background: none; color: var(--danger); font-size: 13px; padding: 4px 8px; }
  .p1-btn-move { background: var(--border); color: var(--text); font-size: 13px; padding: 4px 8px; }

  section.p1-section {
    background: var(--panel); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 18px; margin-bottom: 18px;
  }
  section.p1-section > h2 {
    font-size: 15px; text-transform: uppercase; letter-spacing: 0.03em;
    color: var(--hint); margin: 0 0 14px;
  }

  label { display: block; font-size: 12px; color: var(--hint); margin: 10px 0 4px; }
  label:first-of-type { margin-top: 0; }

  input[type="text"], input[type="number"], textarea, select {
    width: 100%; padding: 10px 12px; border: 1px solid var(--border);
    border-radius: 10px; font-size: 14px; font-family: inherit;
    background: #fff; color: var(--text);
  }
  textarea { resize: vertical; min-height: 54px; }
  input:focus, textarea:focus, select:focus { outline: none; border-color: var(--accent); }

  .p1-row-inline { display: flex; gap: 8px; align-items: center; margin-bottom: 6px; }
  .p1-row-inline input { flex: 1; }

  .p1-item {
    border: 1px solid var(--border); border-radius: 12px; padding: 14px;
    margin-bottom: 12px; background: #fcfcfe;
  }
  .p1-item-header {
    display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; gap: 8px;
  }
  .p1-item-header-left { display: flex; align-items: center; gap: 8px; }
  .p1-item-tag {
    font-size: 11px; font-weight: 700; text-transform: uppercase;
    padding: 3px 8px; border-radius: 6px; letter-spacing: 0.03em;
  }
  .p1-item-tag.theory { color: var(--theory-tag); background: var(--theory-tag-soft); }
  .p1-item-tag.exercise { color: var(--ex-tag); background: var(--ex-tag-soft); }
  .p1-item-header-actions { display: flex; gap: 4px; }

  .p1-example-row, .p1-pair-row {
    display: grid; grid-template-columns: 1fr 1fr 1fr auto; gap: 6px; margin-bottom: 6px;
  }
  .p1-pair-row { grid-template-columns: 1fr 1fr auto; }

  .p1-basic-grid { display: grid; grid-template-columns: 2fr 1fr; gap: 12px; }

  #p1-json-output {
    width: 100%; min-height: 220px; font-family: "SF Mono", Menlo, Consolas, monospace;
    font-size: 12px; white-space: pre;
  }
  .p1-output-actions { display: flex; gap: 8px; margin-top: 10px; }
  .p1-empty-hint { color: var(--hint); font-size: 13px; font-style: italic; }
</style>
</head>
<body>
<div class="p1-wrap">
  <h1>Конструктор уроков Arcon</h1>
  <p class="p1-subtitle">Теория и задания — один общий список, порядок важен: перемещай карточки стрелками ▲▼</p>

  <div class="p1-toolbar">
    <button id="p1-clear-btn" class="p1-btn-danger">Clear lesson</button>
    <button id="p1-create-btn" class="p1-btn-primary">Create lesson</button>
  </div>

  <section class="p1-section">
    <h2>Основное</h2>
    <div class="p1-basic-grid">
      <div>
        <label for="p1-id-input">ID урока (например 3-1)</label>
        <input type="text" id="p1-id-input" placeholder="3-1">
      </div>
      <div>
        <label for="p1-xp-input">XP</label>
        <input type="number" id="p1-xp-input" value="10">
      </div>
    </div>
    <label for="p1-title-input">Название урока</label>
    <input type="text" id="p1-title-input" placeholder="Множественное число">
  </section>

  <section class="p1-section">
    <h2>Содержимое урока (по порядку)</h2>
    <div id="p1-items-list"></div>
    <div class="p1-row-inline">
      <button id="p1-add-theory-btn" class="p1-btn-ghost p1-btn-small">+ Теория</button>
      <button id="p1-add-exercise-btn" class="p1-btn-ghost p1-btn-small">+ Задание</button>
    </div>
  </section>

  <section class="p1-section">
    <h2>Результат</h2>
    <p class="p1-empty-hint" id="p1-output-hint">Нажми «Create lesson», чтобы собрать JSON.</p>
    <textarea id="p1-json-output" readonly placeholder="Здесь появится готовый JSON..."></textarea>
    <div class="p1-output-actions">
      <button id="p1-copy-btn" class="p1-btn-ghost p1-btn-small">Скопировать</button>
    </div>
  </section>
</div>

<script>
(function () {
  const list = document.getElementById("p1-items-list");

  // ---------- Общие утилиты для карточек в списке ----------

  function moveItem(item, direction) {
    if (direction === "up" && item.previousElementSibling) {
      list.insertBefore(item, item.previousElementSibling);
    } else if (direction === "down" && item.nextElementSibling) {
      list.insertBefore(item.nextElementSibling, item);
    }
  }

  function makeItemHeader(tagLabel, tagClass, item) {
    const header = document.createElement("div");
    header.className = "p1-item-header";
    header.innerHTML = `
      <div class="p1-item-header-left">
        <span class="p1-item-tag ${tagClass}">${tagLabel}</span>
      </div>
      <div class="p1-item-header-actions">
        <button class="p1-btn-move p1-move-up" type="button">▲</button>
        <button class="p1-btn-move p1-move-down" type="button">▼</button>
        <button class="p1-btn-remove p1-remove-item" type="button">Удалить</button>
      </div>
    `;
    header.querySelector(".p1-move-up").onclick = () => moveItem(item, "up");
    header.querySelector(".p1-move-down").onclick = () => moveItem(item, "down");
    header.querySelector(".p1-remove-item").onclick = () => item.remove();
    return header;
  }

  // ---------- Теория ----------

  function makeExampleRow() {
    const row = document.createElement("div");
    row.className = "p1-example-row";
    row.innerHTML = `
      <input type="text" class="p1-ex-word" placeholder="Слово (Arcon)">
      <input type="text" class="p1-ex-ipa" placeholder="IPA / пометка">
      <input type="text" class="p1-ex-translation" placeholder="Перевод">
      <button class="p1-btn-remove" type="button">✕</button>
    `;
    row.querySelector(".p1-btn-remove").onclick = () => row.remove();
    return row;
  }

  function makeTheoryItem() {
    const item = document.createElement("div");
    item.className = "p1-item p1-theory-item";
    item.appendChild(makeItemHeader("Теория", "theory", item));

    const body = document.createElement("div");
    body.innerHTML = `
      <label>Заголовок</label>
      <input type="text" class="p1-t-title" placeholder="Например: Множественное число">
      <label>Текст объяснения</label>
      <textarea class="p1-t-theory" placeholder="Объясни правило своими словами..."></textarea>
      <label>Примеры</label>
      <div class="p1-t-examples"></div>
      <button class="p1-btn-ghost p1-btn-small p1-add-example-btn" type="button">+ Пример</button>
    `;
    body.querySelector(".p1-add-example-btn").onclick = () => {
      body.querySelector(".p1-t-examples").appendChild(makeExampleRow());
    };
    body.querySelector(".p1-t-examples").appendChild(makeExampleRow());
    item.appendChild(body);

    return item;
  }

  document.getElementById("p1-add-theory-btn").onclick = () => {
    list.appendChild(makeTheoryItem());
  };

  // ---------- Задания ----------

  function makeOptionRow(container) {
    const row = document.createElement("div");
    row.className = "p1-row-inline";
    row.innerHTML = `
      <input type="text" class="p1-e-choice-option" placeholder="Вариант ответа">
      <button class="p1-btn-remove" type="button">✕</button>
    `;
    row.querySelector(".p1-btn-remove").onclick = () => row.remove();
    container.appendChild(row);
  }

  function makePairRow(container) {
    const row = document.createElement("div");
    row.className = "p1-pair-row";
    row.innerHTML = `
      <input type="text" class="p1-e-match-word" placeholder="Слово (Arcon)">
      <input type="text" class="p1-e-match-translation" placeholder="Перевод">
      <button class="p1-btn-remove" type="button">✕</button>
    `;
    row.querySelector(".p1-btn-remove").onclick = () => row.remove();
    container.appendChild(row);
  }

  function makeAnswerRow(container) {
    const row = document.createElement("div");
    row.className = "p1-row-inline";
    row.innerHTML = `
      <input type="text" class="p1-e-write-answer" placeholder="Правильный ответ">
      <button class="p1-btn-remove" type="button">✕</button>
    `;
    row.querySelector(".p1-btn-remove").onclick = () => row.remove();
    container.appendChild(row);
  }

  function renderChoiceFields(fieldsEl) {
    fieldsEl.innerHTML = `
      <label>Вопрос</label>
      <textarea class="p1-e-choice-prompt" placeholder="Как будет «Привет»?"></textarea>
      <label>IPA-подсказка (необязательно)</label>
      <input type="text" class="p1-e-choice-ipahint" placeholder="[ˈkji.tɛ]">
      <label>Варианты ответа</label>
      <div class="p1-e-choice-options"></div>
      <button class="p1-btn-ghost p1-btn-small p1-add-option-btn" type="button">+ Вариант</button>
      <label>Правильный ответ (должен точно совпасть с одним из вариантов)</label>
      <input type="text" class="p1-e-choice-answer" placeholder="Qite">
    `;
    const optionsList = fieldsEl.querySelector(".p1-e-choice-options");
    fieldsEl.querySelector(".p1-add-option-btn").onclick = () => makeOptionRow(optionsList);
    makeOptionRow(optionsList);
    makeOptionRow(optionsList);
  }

  function renderMatchFields(fieldsEl) {
    fieldsEl.innerHTML = `
      <label>Пары для сопоставления</label>
      <div class="p1-e-match-pairs"></div>
      <button class="p1-btn-ghost p1-btn-small p1-add-pair-btn" type="button">+ Пара</button>
    `;
    const pairsList = fieldsEl.querySelector(".p1-e-match-pairs");
    fieldsEl.querySelector(".p1-add-pair-btn").onclick = () => makePairRow(pairsList);
    makePairRow(pairsList);
    makePairRow(pairsList);
  }

  function renderWriteFields(fieldsEl) {
    fieldsEl.innerHTML = `
      <label>Задание (можно с переносом строки — фраза на новой строке)</label>
      <textarea class="p1-e-write-prompt" placeholder="Переведи фразу:&#10;Qo ede vū?"></textarea>
      <label>Что озвучить по кнопке 🔊 (необязательно, пиши на Arcon без знаков препинания)</label>
      <input type="text" class="p1-e-write-speak" placeholder="Qo ede vū">
      <label>IPA-подсказка (необязательно)</label>
      <input type="text" class="p1-e-write-ipahint" placeholder="">
      <label>Правильные ответы</label>
      <div class="p1-e-write-answers"></div>
      <button class="p1-btn-ghost p1-btn-small p1-add-answer-btn" type="button">+ Ответ</button>
    `;
    const answersList = fieldsEl.querySelector(".p1-e-write-answers");
    fieldsEl.querySelector(".p1-add-answer-btn").onclick = () => makeAnswerRow(answersList);
    makeAnswerRow(answersList);
  }

  function makeExerciseItem() {
    const item = document.createElement("div");
    item.className = "p1-item p1-exercise-item";
    item.appendChild(makeItemHeader("Задание", "exercise", item));

    const body = document.createElement("div");
    body.innerHTML = `
      <label>Тип задания (Etype)</label>
      <select class="p1-e-etype-select">
        <option value="choice">choice — выбор варианта</option>
        <option value="match">match — сопоставление пар</option>
        <option value="write">write — открытый ответ</option>
      </select>
      <div class="p1-e-fields"></div>
    `;
    item.appendChild(body);

    const fieldsEl = body.querySelector(".p1-e-fields");
    const typeSelect = body.querySelector(".p1-e-etype-select");

    function renderForType() {
      if (typeSelect.value === "choice") renderChoiceFields(fieldsEl);
      else if (typeSelect.value === "match") renderMatchFields(fieldsEl);
      else if (typeSelect.value === "write") renderWriteFields(fieldsEl);
    }
    typeSelect.onchange = renderForType;
    renderForType();

    return item;
  }

  document.getElementById("p1-add-exercise-btn").onclick = () => {
    list.appendChild(makeExerciseItem());
  };

  // ---------- Сборка JSON ----------

  function buildLesson() {
    const lesson = {
      id: document.getElementById("p1-id-input").value.trim(),
      title: document.getElementById("p1-title-input").value.trim(),
      xp: parseInt(document.getElementById("p1-xp-input").value, 10) || 10,
      lesson: [],
    };

    // Порядок в итоговом JSON = порядок карточек в DOM (управляется стрелками ▲▼)
    [...list.children].forEach((item) => {
      if (item.classList.contains("p1-theory-item")) {
        const title = item.querySelector(".p1-t-title").value.trim();
        const theory = item.querySelector(".p1-t-theory").value.trim();
        const examples = [];
        item.querySelectorAll(".p1-example-row").forEach((row) => {
          const word = row.querySelector(".p1-ex-word").value.trim();
          const ipa = row.querySelector(".p1-ex-ipa").value.trim();
          const translation = row.querySelector(".p1-ex-translation").value.trim();
          if (word) examples.push({ word, ipa, translation });
        });
        if (title || theory || examples.length) {
          lesson.lesson.push({ type: "T", title, theory, examples });
        }
      } else if (item.classList.contains("p1-exercise-item")) {
        const etype = item.querySelector(".p1-e-etype-select").value;

        if (etype === "choice") {
          const prompt = item.querySelector(".p1-e-choice-prompt").value.trim();
          const ipaHint = item.querySelector(".p1-e-choice-ipahint").value.trim() || null;
          const options = [...item.querySelectorAll(".p1-e-choice-option")]
            .map((i) => i.value.trim())
            .filter((v) => v);
          const answer = item.querySelector(".p1-e-choice-answer").value.trim();
          if (prompt && options.length) {
            lesson.lesson.push({ type: "E", Etype: "choice", prompt, ipaHint, options, answer });
          }
        } else if (etype === "match") {
          const pairs = [...item.querySelectorAll(".p1-pair-row")]
            .map((row) => [
              row.querySelector(".p1-e-match-word").value.trim(),
              row.querySelector(".p1-e-match-translation").value.trim(),
            ])
            .filter((p) => p[0] && p[1]);
          if (pairs.length) {
            lesson.lesson.push({ type: "E", Etype: "match", pairs });
          }
        } else if (etype === "write") {
          const prompt = item.querySelector(".p1-e-write-prompt").value.trim();
          const speak = item.querySelector(".p1-e-write-speak").value.trim() || null;
          const ipaHint = item.querySelector(".p1-e-write-ipahint").value.trim() || null;
          const answers = [...item.querySelectorAll(".p1-e-write-answer")]
            .map((i) => i.value.trim())
            .filter((v) => v);
          if (prompt && answers.length) {
            lesson.lesson.push({ type: "E", Etype: "write", prompt, speak, ipaHint, answers });
          }
        }
      }
    });

    return lesson;
  }

  function downloadFile(filename, content) {
    const blob = new Blob([content], { type: "application/json" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    a.download = filename;
    document.body.appendChild(a);
    a.click();
    a.remove();
    URL.revokeObjectURL(url);
  }

  document.getElementById("p1-create-btn").onclick = () => {
    const lesson = buildLesson();
    if (!lesson.id) {
      alert("Заполни ID урока — без него не получится назвать файл.");
      return;
    }
    const json = JSON.stringify(lesson, null, 2);
    const output = document.getElementById("p1-json-output");
    output.value = json;
    document.getElementById("p1-output-hint").textContent =
      `Готово — файл "${lesson.id}.json" скачался. Также можешь скопировать текст ниже.`;
    downloadFile(lesson.id + ".json", json);
  };

  document.getElementById("p1-copy-btn").onclick = () => {
    const output = document.getElementById("p1-json-output");
    if (!output.value) return;
    output.select();
    document.execCommand("copy");
  };

  document.getElementById("p1-clear-btn").onclick = () => {
    if (!confirm("Точно сбросить весь урок? Все введённые данные пропадут.")) return;
    document.getElementById("p1-id-input").value = "";
    document.getElementById("p1-title-input").value = "";
    document.getElementById("p1-xp-input").value = "10";
    list.innerHTML = "";
    document.getElementById("p1-json-output").value = "";
    document.getElementById("p1-output-hint").textContent = "Нажми «Create lesson», чтобы собрать JSON.";
  };

  // Стартовое состояние — одна теория и одно задание, чтобы было видно, с чего начать
  list.appendChild(makeTheoryItem());
  list.appendChild(makeExerciseItem());
})();
</script>
</body>
</html>
